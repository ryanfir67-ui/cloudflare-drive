name = "r2-upload-download-10gb"
main = "src/worker.js"
compatibility_date = "2026-06-01"

# Buat bucket R2 dengan nama ini dulu di Cloudflare Dashboard atau pakai:
# npx wrangler r2 bucket create upload-download-10gb
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "ryy-storage"

# Opsional: batasi akses upload dengan password sederhana.
# Set via dashboard Variables & Secrets: UPLOAD_PASSWORD = password_anda
[vars]
MAX_FILE_SIZE_GB = "10"
